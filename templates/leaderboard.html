<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Champions — Focus Fighter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #06030f;
            font-family: 'Press Start 2P', monospace;
        }

        /* Mystical background */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(138, 43, 226, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 60, 120, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(50, 10, 80, 0.5) 0%, transparent 60%);
            background-color: #06030f;
        }

        /* Floating rune particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(138, 43, 226, 0.6);
            animation: floatUp linear infinite;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.6;
            }

            100% {
                transform: translateY(-100vh) scale(0);
                opacity: 0;
            }
        }

        /* Page frame */
        .page {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            overflow-y: auto;
        }

        .page-title {
            font-size: 22px;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.9), 0 0 40px rgba(212, 175, 55, 0.5);
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-align: center;
        }

        .page-sub {
            font-size: 7px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        /* Stone Tablet container */
        .tablet {
            width: min(780px, 92%);
            background: linear-gradient(180deg, #2a2535 0%, #1a1828 60%, #120f1e 100%);
            border: 3px solid #4a4060;
            border-radius: 12px;
            box-shadow:
                0 0 0 1px rgba(212, 175, 55, 0.2),
                0 30px 60px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                inset 0 0 40px rgba(0, 0, 0, 0.5);
            padding: 32px 28px;
            position: relative;
            margin-bottom: 40px;
        }

        /* Corner rune ornaments */
        .tablet::before,
        .tablet::after {
            content: '✦';
            position: absolute;
            font-size: 18px;
            color: #d4af37;
            opacity: 0.5;
        }

        .tablet::before {
            top: 10px;
            left: 14px;
        }

        .tablet::after {
            top: 10px;
            right: 14px;
        }

        /* Individual rows */
        .lb-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .lb-row::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: rgba(138, 43, 226, 0.5);
        }

        .lb-row:hover {
            transform: scale(1.015);
            border-color: rgba(138, 43, 226, 0.5);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.25);
        }

        /* TOP TEAM */
        .lb-row.rank-1 {
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.18), rgba(0, 0, 0, 0.4));
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3), inset 0 0 10px rgba(212, 175, 55, 0.05);
            transform: scale(1.03);
            margin-bottom: 20px;
        }

        .lb-row.rank-1::before {
            background: #d4af37;
        }

        .lb-row.rank-1:hover {
            transform: scale(1.055);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5);
        }

        .rank-num {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }

        .rank-1 .rank-num {
            color: #d4af37;
            text-shadow: 0 0 10px #d4af37;
        }

        .crown-wrap {
            position: relative;
            width: 52px;
            height: 52px;
            flex-shrink: 0;
        }

        .crown-wrap .crown-icon {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4af37;
            font-size: 20px;
            filter: drop-shadow(0 0 8px #d4af37);
            animation: crownBob 2s ease-in-out infinite;
            display: none;
        }

        .rank-1 .crown-icon {
            display: block;
        }

        @keyframes crownBob {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
                filter: drop-shadow(0 0 6px #d4af37);
            }

            50% {
                transform: translateX(-50%) translateY(-5px);
                filter: drop-shadow(0 0 16px #fff);
            }
        }

        .emblem-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.5) 0%, rgba(0, 0, 0, 0.7) 70%);
            border: 2px solid #8a2be2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 12px #8a2be2, inset 0 0 8px rgba(138, 43, 226, 0.3);
            animation: runeGlow 3s infinite alternate;
        }

        .rank-1 .emblem-circle {
            border-color: #d4af37;
            box-shadow: 0 0 20px #d4af37, inset 0 0 12px rgba(212, 175, 55, 0.2);
        }

        @keyframes runeGlow {
            0% {
                box-shadow: 0 0 8px #8a2be2;
            }

            100% {
                box-shadow: 0 0 20px #8a2be2, 0 0 35px rgba(138, 43, 226, 0.3);
            }
        }

        .team-details {
            flex: 1;
        }

        .team-name-lb {
            font-size: 10px;
            color: #fff;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.3);
            margin-bottom: 4px;
        }

        .rank-1 .team-name-lb {
            color: #d4af37;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.8);
            font-size: 12px;
        }

        .team-pts-lb {
            font-size: 9px;
            color: #00ffd2;
            text-shadow: 0 0 8px rgba(0, 255, 210, 0.5);
        }

        .rank-1 .team-pts-lb {
            font-size: 12px;
            text-shadow: 0 0 15px rgba(0, 255, 210, 0.8);
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(20, 20, 20, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.35);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            text-decoration: none;
            backdrop-filter: blur(6px);
            transition: all 0.3s;
        }

        .back-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
            box-shadow: 0 0 16px rgba(212, 175, 55, 0.4);
            transform: scale(1.04);
        }

        /* Divider subtitle */
        .tablet-sub {
            font-size: 7px;
            color: rgba(212, 175, 55, 0.5);
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 22px;
        }
    </style>
</head>

<body>
    <div class="bg-layer"></div>

    <!-- Floating particles -->
    <div id="particles"></div>

    <a href="/" class="back-btn">
        <i class="ph ph-arrow-left"></i> RETURN
    </a>

    <div class="page">
        <h1 class="page-title">HALL OF CHAMPIONS</h1>
        <p class="page-sub">~ REALM STANDINGS ~</p>

        <div class="tablet">
            <div class="tablet-sub">✦ CARVED BY THE ANCIENT SCRIBES ✦</div>
            <div id="lb-list">
                <div style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-size:8px;">
                    Deciphering ancient records...
                </div>
            </div>
        </div>
    </div>

    <script>
        // Spawn background particles
        const particleContainer = document.getElementById('particles');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 3 + Math.random() * 5;
            p.style.cssText = `
                width:${size}px; height:${size}px;
                left:${Math.random() * 100}%;
                bottom:${Math.random() * 20}%;
                animation-duration:${8 + Math.random() * 12}s;
                animation-delay:${-Math.random() * 15}s;
                opacity:${0.2 + Math.random() * 0.4};
            `;
            particleContainer.appendChild(p);
        }

        // Fetch + render leaderboard
        function fetchLeaderboard() {
            fetch('/api/teams')
                .then(r => r.json())
                .then(teams => renderLeaderboard(teams))
                .catch(() => {
                    document.getElementById('lb-list').innerHTML =
                        '<div style="text-align:center;padding:40px;color:#ff4466;font-size:8px;">Failed to summon the ancient records.</div>';
                });
        }

        function renderLeaderboard(teams) {
            const list = document.getElementById('lb-list');
            list.innerHTML = '';

            teams.forEach((team, idx) => {
                const rank = idx + 1;
                const isFirst = rank === 1;

                const row = document.createElement('div');
                row.className = `lb-row ${isFirst ? 'rank-1' : ''}`;
                row.innerHTML = `
                    <span class="rank-num">#${rank}</span>
                    <div class="crown-wrap">
                        <i class="ph-fill ph-crown crown-icon"></i>
                        <div class="emblem-circle">${team.emblem}</div>
                    </div>
                    <div class="team-details">
                        <div class="team-name-lb">${team.name}</div>
                        <div class="team-pts-lb">${Number(team.points).toLocaleString()} PTS</div>
                    </div>
                `;
                list.appendChild(row);

                // Slide-in animation
                gsap.fromTo(row,
                    { x: -60, opacity: 0 },
                    { x: 0, opacity: 1, duration: 0.55, delay: idx * 0.12, ease: 'power3.out' }
                );
            });
        }

        document.addEventListener('DOMContentLoaded', fetchLeaderboard);
        setInterval(fetchLeaderboard, 10000); // auto-refresh every 10s
    </script>
</body>

</html>
