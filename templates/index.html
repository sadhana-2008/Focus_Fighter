<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Fighter Lobby</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Base Reset */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevent scrolling */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        /* Full Screen Background GIF */
        .bg-gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background-color: #222;
            /* Fallback color so at least it won't be pitch black */
            background-image: url('/static/bg_gif.gif?v=2');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            opacity: 0.85;
        }

        /* Common Cinematic Button Styles */
        .cinematic-btn {
            background-color: rgba(20, 20, 20, 0.45);
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .cinematic-btn:hover {
            background-color: rgba(60, 60, 60, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
            border-color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        }

        .cinematic-btn:active {
            transform: scale(0.98);
        }

        /* Center Layout for Main Buttons Using Flexbox */
        .center-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Main Buttons Sizing */
        .main-btn {
            padding: 16px 32px;
            min-width: 220px;
            pointer-events: auto;
        }

        /* Top Right Profile Button */
        .profile-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 12px 20px;
            font-size: 10px;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        /* Full-Screen Lobby Styles */
        .lobby-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Hidden by default until activated */
            opacity: 0;
            pointer-events: none;
        }

        .lobby-fullscreen.active {
            pointer-events: auto;
        }

        .lobby-box-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.4);
            padding: 1px;
            clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
            display: inline-block;
            margin-bottom: 24px;
            transform: scale(0.85);
            /* Scaled down room code box */
        }

        .lobby-box-content {
            background-color: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Slot Machine Styles */
        .slot-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            height: 90px;
            overflow: hidden;
            position: relative;
        }

        .slot {
            width: 70px;
            height: 90px;
            font-size: 64px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            font-family: 'Segoe UI', Roboto, sans-serif;
            font-weight: bold;
        }

        .slot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(10, 25, 47, 0.9) 0%, transparent 20%, transparent 80%, rgba(10, 25, 47, 0.9) 100%);
            pointer-events: none;
        }

        .slot-inner {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .char {
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .dash-char {
            font-size: 64px;
            color: #ffffff;
            display: flex;
            align-items: center;
            height: 90px;
            font-family: 'Segoe UI', Roboto, sans-serif;
            font-weight: bold;
        }

        .heavy-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.6), 0 0 45px rgba(255, 255, 255, 0.4);
        }

        /* Player Slots */
        .player-slot-card {
            width: 70px;
            height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .player-slot-card.filled {
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            background-color: rgba(255, 255, 255, 0.1);
        }

        .player-slot-card.filled img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
            transform: scale(1.2) translateY(5px);
        }

        /* Pomodoro Panel */
        .pomodoro-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 16px 32px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            width: 700px;
            gap: 24px;
            position: relative;
            z-index: 10;
        }

        .pomo-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pomo-btn:hover {
            color: #ffffff;
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Custom Pixel-Logic Toggle */
        .pixel-toggle {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .pixel-toggle.active {
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.15);
        }

        .pixel-toggle i {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .pixel-toggle.active i {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 1);
        }

        /* Container Height Restraint */
        .lobby-main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            max-height: 85vh;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom,
                    rgba(255, 255, 255, 0),
                    rgba(255, 255, 255, 0) 50%,
                    rgba(0, 0, 0, 0.1) 50%,
                    rgba(0, 0, 0, 0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.05;
        }

        /* High-End Pixel Text Glow */
        .pixel-text {
            font-family: 'Press Start 2P', monospace;
            text-shadow: 0 0 10px white;
        }

        /* Button Text Bloom */
        .text-bloom {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* Footer Actions */
        .footer-action-container {
            width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            position: relative;
            z-index: 10;
        }

        .footer-btn {
            background: rgba(20, 20, 20, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 0 24px;
            border-radius: 8px;
            /* Perfect border-radius consistency */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            height: 48px;
            /* Force uniform height */
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }

        .footer-btn:hover {
            border-color: #ffffff;
            background: rgba(60, 60, 60, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .footer-btn.primary-glow {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        }

        .footer-btn.primary-glow:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        /* Host Glow Animation */
        @keyframes hostPulse {
            0% {
                box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
                border-color: rgba(255, 255, 255, 0.6);
            }

            50% {
                box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
                border-color: rgba(255, 255, 255, 1);
            }

            100% {
                box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
                border-color: rgba(255, 255, 255, 0.6);
            }
        }

        .host-glow {
            animation: hostPulse 2s infinite ease-in-out;
            background-color: rgba(255, 255, 255, 0.15) !important;
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="bg-gif"></div>

    <!-- Top Right Corner -->
    <button class="cinematic-btn profile-btn" onclick="alert('Profile clicked!')">Profile</button>

    <!-- Center Screen (Main Menu) -->
    <div class="center-container" id="main-menu">
        <button class="cinematic-btn main-btn" onclick="openFullscreenLobby()">Create Lobby</button>
        <button class="cinematic-btn main-btn" onclick="alert('Join Lobby clicked!')">Join Lobby</button>
    </div>

    <!-- Character Selection Overlay (GSAP + Tailwind) -->
    <div id="profile-overlay" class="fixed inset-0 z-50 hidden">
        <!-- Background Overlay -->
        <div class="absolute inset-0 w-full h-full" style="background: url('/static/staticpurple_bg.jpg') no-repeat center center; 
                    background-size: cover; 
                    backdrop-filter: blur(12px) brightness(0.3); 
                    -webkit-backdrop-filter: blur(12px) brightness(0.3);">
        </div>

        <!-- Header Controls -->
        <div class="absolute top-0 w-full flex justify-between p-8 z-10 items-center">
            <input type="text" placeholder="GAMER TAG"
                class="bg-transparent border-b-2 border-white text-white placeholder-[rgba(255,255,255,0.7)] outline-none px-2 py-1 w-64"
                style="font-family: 'Press Start 2P', monospace; color: #FFFFFF;">

            <h1 class="text-white text-center absolute left-1/2 -translate-x-1/2 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]"
                style="font-family: 'Press Start 2P', monospace;">CUSTOMIZE AVATAR</h1>

            <div class="flex gap-6">
                <i class="ph ph-x-circle text-[36px] text-white hover:scale-110 transition-transform cursor-pointer"
                    onclick="closeOverlay()"></i>
                <i class="ph ph-check-circle text-[36px] text-white hover:scale-110 transition-transform cursor-pointer"
                    onclick="closeOverlay()"></i>
            </div>
        </div>

        <!-- Carousel -->
        <div class="carousel-wrapper relative z-0 flex gap-16 overflow-x-auto h-full items-center px-[30vw]"
            style="scroll-snap-type: x mandatory;">
            <style>
                .carousel-wrapper::-webkit-scrollbar {
                    display: none;
                }

                .carousel-wrapper {
                    -ms-overflow-style: none;
                    scrollbar-width: none;
                }
            </style>

            <script>
                // Generate exactly 8 cards
                for (let i = 1; i <= 8; i++) {
                    document.write(`
                        <div class="char-card w-[240px] h-[360px] shrink-0 relative flex flex-col items-center justify-end overflow-hidden cursor-pointer" 
                             style="scroll-snap-align: center; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px;">
                            <img src="/static/characters/char${i}.png" class="absolute inset-0 w-full h-full object-contain pointer-events-none p-4 pb-16">
                            <span class="select-text absolute bottom-6 text-[10px] text-white/50 opacity-0 transition-opacity duration-300 pointer-events-none" style="font-family: 'Press Start 2P', monospace;">CLICK TO SELECT</span>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>

    <!-- Full-Screen Lobby Overlay -->
    <div class="lobby-fullscreen" id="fullscreen-lobby">
        <div class="scanlines"></div> <!-- High-End Scanline FX -->

        <div class="lobby-main-content py-8">

            <div class="flex flex-col items-center">
                <!-- Lottery Code Generator -->
                <div class="lobby-box-wrapper shadow-[0_0_30px_rgba(255,255,255,0.1)]">
                    <div class="lobby-box-content">
                        <!-- Removed "ROOM CODE GENERATED" to space -->
                        <div class="slot-container mb-2" id="fs-code-slots">
                            <!-- Slots manipulated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Player Slots -->
                <div class="flex flex-col items-center mb-8">
                    <div class="text-white text-[10px] mb-4 tracking-[2px] opacity-80 pixel-text">1 / 4 PLAYERS JOINED
                    </div>
                    <div class="flex gap-4">
                        <div class="player-slot-card filled" id="host-player-slot">
                            <img src="/static/characters/char1.png" id="host-avatar" alt="Player 1 Avatar">
                        </div>
                        <div class="player-slot-card"><i class="ph ph-user text-white/20 text-2xl"></i></div>
                        <div class="player-slot-card"><i class="ph ph-user text-white/20 text-2xl"></i></div>
                        <div class="player-slot-card"><i class="ph ph-user text-white/20 text-2xl"></i></div>
                    </div>
                </div>

                <!-- Pomodoro Settings Panel (Vertical Stack) -->
                <div class="flex flex-col items-center gap-4 relative z-10 w-[700px]">
                    <!-- Fight Duration Row -->
                    <div class="pomodoro-panel" style="width: 100%; margin-bottom: 0;">
                        <div
                            class="text-white text-[10px] tracking-[2px] opacity-80 whitespace-nowrap w-[200px] pixel-text">
                            FIGHT DURATION</div>

                        <div class="flex items-center gap-6 justify-center flex-1">
                            <!-- Minutes -->
                            <div class="flex items-center gap-4">
                                <button class="pomo-btn timer-ctrl"><i class="ph ph-minus text-lg"></i></button>
                                <div class="text-white text-4xl tracking-widest heavy-glow pomo-num pixel-text">25</div>
                                <button class="pomo-btn timer-ctrl"><i class="ph ph-plus text-lg"></i></button>
                            </div>

                            <div class="text-white opacity-50 text-4xl pixel-text">:</div>

                            <!-- Seconds -->
                            <div class="flex items-center gap-4">
                                <button class="pomo-btn timer-ctrl"><i class="ph ph-minus text-lg"></i></button>
                                <div class="text-white text-4xl tracking-widest heavy-glow pomo-num pixel-text">00</div>
                                <button class="pomo-btn timer-ctrl"><i class="ph ph-plus text-lg"></i></button>
                            </div>
                        </div>
                        <div class="w-[200px]"></div> <!-- Spacer for perfect centering -->
                    </div>

                    <!-- Include Breaks Toggle (Directly Below) -->
                    <div class="flex items-center gap-4 my-2">
                        <div class="text-white text-[10px] tracking-[1px] opacity-80 whitespace-nowrap pixel-text">
                            INCLUDE BREAKS</div>
                        <div class="pixel-toggle active" id="breaks-toggle" onclick="toggleBreaks()">
                            <i class="ph ph-check-circle" id="breaks-icon"></i>
                        </div>
                    </div>

                    <!-- Break Time Reveal Row -->
                    <div class="pomodoro-panel overflow-hidden" id="break-timer-panel"
                        style="width: 100%; margin-bottom: 0;">
                        <div
                            class="text-white text-[10px] tracking-[2px] opacity-80 whitespace-nowrap w-[200px] pixel-text">
                            BREAK TIME</div>

                        <div class="flex items-center gap-6 justify-center flex-1">
                            <!-- Minutes -->
                            <div class="flex items-center gap-4">
                                <button class="pomo-btn timer-ctrl"><i class="ph ph-minus text-lg"></i></button>
                                <div class="text-white text-4xl tracking-widest heavy-glow pomo-num pixel-text">05</div>
                                <button class="pomo-btn timer-ctrl"><i class="ph ph-plus text-lg"></i></button>
                            </div>

                            <div class="text-white opacity-50 text-4xl pixel-text">:</div>

                            <!-- Seconds -->
                            <div class="flex items-center gap-4">
                                <button class="pomo-btn timer-ctrl"><i class="ph ph-minus text-lg"></i></button>
                                <div class="text-white text-4xl tracking-widest heavy-glow pomo-num pixel-text">00</div>
                                <button class="pomo-btn timer-ctrl"><i class="ph ph-plus text-lg"></i></button>
                            </div>
                        </div>
                        <div class="w-[200px]"></div> <!-- Spacer for perfect centering -->
                    </div>
                </div>
            </div>

            <!-- Footer Actions -->
            <div class="footer-action-container">
                <button class="footer-btn" onclick="alert('Code Copied!')">
                    <i class="ph ph-link text-lg"></i> <span class="pixel-text">COPY CODE</span>
                </button>
                <div class="flex gap-4">
                    <button class="footer-btn" onclick="closeFullscreenLobby()">
                        <span class="pixel-text">LEAVE LOBBY</span>
                    </button>
                    <button class="footer-btn primary-glow">
                        <span class="text-bloom pixel-text">START FIGHT</span> <i class="ph ph-sword text-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP Animations -->
    <script>
        const profileOverlay = document.getElementById('profile-overlay');
        const profileBtn = document.querySelector('.profile-btn');

        // Mount Animation
        profileBtn.onclick = () => {
            profileOverlay.classList.remove('hidden');
            gsap.fromTo('.char-card',
                { y: 40, opacity: 0 },
                { y: 0, opacity: 1, stagger: 0.1, duration: 0.8, ease: 'back.out(1.5)', clearProps: 'transform,opacity' }
            );
        };

        function closeOverlay() {
            profileOverlay.classList.add('hidden');
        }

        // Hover & Click Logic
        const cards = document.querySelectorAll('.char-card');

        cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                if (!card.classList.contains('selected-card')) {
                    gsap.to(card, { scale: 1.08, duration: 0.3, ease: 'power2.out' });
                    card.style.borderColor = 'rgb(255, 255, 255)';
                    card.style.boxShadow = '0 0 30px rgba(255, 255, 255, 0.9)';
                    const sText = card.querySelector('.select-text');
                    if (sText) {
                        sText.classList.remove('opacity-0', 'text-white/50');
                        sText.classList.add('opacity-100', 'text-white');
                    }
                }
            });

            card.addEventListener('mouseleave', () => {
                if (!card.classList.contains('selected-card')) {
                    gsap.to(card, { scale: 1, duration: 0.3, ease: 'power2.out' });
                    card.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                    card.style.boxShadow = 'none';
                    const sText = card.querySelector('.select-text');
                    if (sText) {
                        sText.classList.remove('opacity-100', 'text-white');
                        sText.classList.add('opacity-0', 'text-white/50');
                    }
                }
            });

            card.addEventListener('click', (e) => {
                e.stopPropagation();

                // Clear others
                cards.forEach(c => {
                    c.classList.remove('selected-card');
                    gsap.to(c, { scale: 1, duration: 0.3 });
                    c.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                    c.style.boxShadow = 'none';
                    const cText = c.querySelector('.select-text');
                    if (cText) {
                        cText.innerText = 'CLICK TO SELECT';
                        cText.classList.remove('opacity-100', 'text-white');
                        cText.classList.add('opacity-0', 'text-white/50');
                    }
                });

                // Set selected state & Memory
                card.classList.add('selected-card');
                card.style.borderColor = 'rgb(255, 255, 255)';
                card.style.boxShadow = '0 0 30px rgba(255, 255, 255, 0.9)';
                const sText = card.querySelector('.select-text');
                if (sText) {
                    sText.innerText = 'SELECTED';
                    sText.classList.remove('opacity-0', 'text-white/50');
                    sText.classList.add('opacity-100', 'text-white');
                }

                // Save Character Selection internally
                const charImgSrc = card.querySelector('img').src;
                // Extract 'charX.png'
                const charName = charImgSrc.substring(charImgSrc.lastIndexOf('/') + 1);
                localStorage.setItem('selectedChar', charName);

                // Click Bounce
                gsap.fromTo(card,
                    { scale: 0.95 },
                    { scale: 1.08, ease: 'elastic.out(1, 0.4)', duration: 0.6 }
                );
            });
        });

        // Full-Screen Lobby Logic & Animation
        const mainMenu = document.getElementById('main-menu');
        const profileBtnTop = document.querySelector('.profile-btn');
        const fsLobby = document.getElementById('fullscreen-lobby');
        const fsCodeSlots = document.getElementById('fs-code-slots');

        const generatedCode = "AX72-P";
        const rollChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

        // Generate Slot DOM once
        generatedCode.split('').forEach((char, index) => {
            if (char === '-') {
                const dash = document.createElement('div');
                dash.className = 'dash-char';
                dash.innerText = '-';
                fsCodeSlots.appendChild(dash);
            } else {
                const slot = document.createElement('div');
                slot.className = 'slot';

                const inner = document.createElement('div');
                inner.className = 'slot-inner';

                // Add random chars for spin effect
                const spinCount = 15 + (index * 4);
                for (let i = 0; i < spinCount; i++) {
                    const randomChar = document.createElement('div');
                    randomChar.className = 'char text-white/40';
                    randomChar.innerText = rollChars.charAt(Math.floor(Math.random() * rollChars.length));
                    inner.appendChild(randomChar);
                }

                // Final character
                const finalCharDOM = document.createElement('div');
                finalCharDOM.className = 'char final-char';
                finalCharDOM.innerText = char;
                inner.appendChild(finalCharDOM);

                slot.appendChild(inner);
                fsCodeSlots.appendChild(slot);
            }
        });

        const slotInners = document.querySelectorAll('#fs-code-slots .slot-inner');

        function openFullscreenLobby() {
            // Hide menu
            mainMenu.style.opacity = '0';
            mainMenu.style.pointerEvents = 'none';
            profileBtnTop.style.opacity = '0';
            profileBtnTop.style.pointerEvents = 'none';

            // Sync Character from Memory
            const savedChar = localStorage.getItem('selectedChar');
            const hostSlot = document.getElementById('host-player-slot');
            const hostAvatar = document.getElementById('host-avatar');

            if (savedChar) {
                hostAvatar.src = '/static/characters/' + savedChar;
            }
            hostSlot.classList.add('host-glow');

            // Show lobby layer
            fsLobby.classList.add('active');
            gsap.to(fsLobby, { opacity: 1, duration: 0.5 });

            // Reset slots
            gsap.set(slotInners, { y: 0 });
            document.querySelectorAll('.final-char').forEach(el => el.classList.remove('heavy-glow'));

            // Run Spin Animation
            slotInners.forEach((inner, index) => {
                const totalElements = inner.children.length;
                const distance = -((totalElements - 1) * 90);

                gsap.to(inner, {
                    y: distance,
                    duration: 1.5 + (index * 0.2), // Base 1.5s as requested
                    ease: "power4.inOut",
                    onComplete: () => {
                        const finalChar = inner.querySelector('.final-char');
                        if (finalChar) {
                            finalChar.classList.add('heavy-glow');
                        }
                    }
                });
            });

            // Fade in other elements slightly after slots start spinning
            gsap.fromTo('.pomodoro-panel', { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, delay: 0.5, ease: "power2.out" });
            gsap.fromTo('.footer-btn', { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, stagger: 0.1, delay: 0.8 });
            gsap.fromTo('.player-slot-card', { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, stagger: 0.1, delay: 0.6, ease: "back.out(1.5)" });
        }

        function closeFullscreenLobby() {
            gsap.to(fsLobby, {
                opacity: 0,
                duration: 0.4,
                onComplete: () => {
                    fsLobby.classList.remove('active');
                    // Show menu again
                    mainMenu.style.opacity = '1';
                    mainMenu.style.pointerEvents = 'auto';
                    profileBtnTop.style.opacity = '1';
                    profileBtnTop.style.pointerEvents = 'auto';
                }
            });
        }

        // Toggle Pixel-Logic
        function toggleBreaks() {
            const tgl = document.getElementById('breaks-toggle');
            const icon = document.getElementById('breaks-icon');
            const breakPanel = document.getElementById('break-timer-panel');

            if (tgl.classList.contains('active')) {
                tgl.classList.remove('active');
                icon.className = "ph ph-x-circle";
                gsap.fromTo(tgl, { scale: 0.9 }, { scale: 1, duration: 0.5, ease: "elastic.out(1,0.5)" });

                // Hide Break Timer
                gsap.to(breakPanel, {
                    height: 0,
                    opacity: 0,
                    marginTop: 0,
                    duration: 0.4,
                    ease: "power2.in",
                    onComplete: () => {
                        breakPanel.style.display = 'none';
                    }
                });
            } else {
                tgl.classList.add('active');
                icon.className = "ph ph-check-circle";
                gsap.fromTo(tgl, { scale: 0.9 }, { scale: 1, duration: 0.5, ease: "elastic.out(1,0.5)" });

                // Show Break Timer
                breakPanel.style.display = 'flex';
                gsap.fromTo(breakPanel,
                    { height: 0, opacity: 0, marginTop: -20 },
                    { height: 'auto', opacity: 1, marginTop: 0, duration: 0.5, ease: "back.out(1.2)" }
                );
            }
        }

        // Jitter Animation for Timer Controls
        document.querySelectorAll('.timer-ctrl').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const targetNum = btn.parentNode.querySelector('.pomo-num');
                if (targetNum) {
                    gsap.fromTo(targetNum,
                        { y: -2 },
                        { y: 0, duration: 0.2, ease: "bounce.out" }
                    );
                }
            });
        });
    </script>
</body>

</html>
