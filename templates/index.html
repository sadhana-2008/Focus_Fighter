<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Fighter Lobby</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Base Reset */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevent scrolling */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        /* Full Screen Background GIF */
        .bg-gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background-color: #222;
            /* Fallback color so at least it won't be pitch black */
            background-image: url('/static/bg_gif.gif?v=2');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            opacity: 0.85;
        }

        /* Common Cinematic Button Styles */
        .cinematic-btn {
            background-color: rgba(20, 20, 20, 0.45);
            /* Dark semi-transparent */
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.8);
            /* White borders */
            border-radius: 8px;
            /* Slightly rounded for modern look */
            font-size: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            /* Strengthened Glassmorphism effect */
            -webkit-backdrop-filter: blur(8px);
            /* Safari support */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .cinematic-btn:hover {
            background-color: rgba(60, 60, 60, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
            border-color: #ffffff;
        }

        .cinematic-btn:active {
            transform: scale(0.98);
        }

        /* Center Layout for Main Buttons Using Flexbox */
        .center-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            /* Symmetrical spacing */
            z-index: 10;
            pointer-events: none;
            /* Let clicks pass through empty space */
        }

        /* Main Buttons Sizing */
        .main-btn {
            padding: 20px 40px;
            min-width: 220px;
            pointer-events: auto;
            /* Re-enable clicks for buttons */
        }

        /* Top Right Profile Button */
        .profile-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 10px 25px;
            font-size: 16px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="bg-gif"></div>

    <!-- Top Right Corner -->
    <button class="cinematic-btn profile-btn" onclick="alert('Profile clicked!')">Profile</button>

    <!-- Center Screen -->
    <div class="center-container">
        <button class="cinematic-btn main-btn" onclick="alert('Create Lobby clicked!')">Create Lobby</button>
        <button class="cinematic-btn main-btn" onclick="alert('Join Lobby clicked!')">Join Lobby</button>
    </div>

    <!-- Character Selection Overlay (GSAP + Tailwind) -->
    <div id="profile-overlay" class="fixed inset-0 z-50 hidden">
        <!-- Background Overlay -->
        <div class="absolute inset-0 w-full h-full" style="background: url('/static/staticpurple_bg.jpg') no-repeat center center; 
                    background-size: cover; 
                    backdrop-filter: blur(12px) brightness(0.3); 
                    -webkit-backdrop-filter: blur(12px) brightness(0.3);">
        </div>

        <!-- Header Controls -->
        <div class="absolute top-0 w-full flex justify-between p-8 z-10 items-center">
            <input type="text" placeholder="GAMER TAG"
                class="bg-transparent border-b-2 border-white text-white placeholder-[rgba(255,255,255,0.7)] outline-none px-2 py-1 w-64"
                style="font-family: 'Press Start 2P', monospace; color: #FFFFFF;">

            <h1 class="text-white text-center absolute left-1/2 -translate-x-1/2 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]"
                style="font-family: 'Press Start 2P', monospace;">CUSTOMIZE AVATAR</h1>

            <div class="flex gap-6">
                <i class="ph ph-x-circle text-[36px] text-white hover:scale-110 transition-transform cursor-pointer"
                    onclick="closeOverlay()"></i>
                <i class="ph ph-check-circle text-[36px] text-white hover:scale-110 transition-transform cursor-pointer"
                    onclick="closeOverlay()"></i>
            </div>
        </div>

        <!-- Carousel -->
        <div class="carousel-wrapper relative z-0 flex gap-16 overflow-x-auto h-full items-center px-[30vw]"
            style="scroll-snap-type: x mandatory;">
            <style>
                .carousel-wrapper::-webkit-scrollbar {
                    display: none;
                }

                .carousel-wrapper {
                    -ms-overflow-style: none;
                    scrollbar-width: none;
                }
            </style>

            <script>
                // Generate exactly 8 cards
                for (let i = 1; i <= 8; i++) {
                    document.write(`
                        <div class="char-card w-[240px] h-[360px] shrink-0 relative flex flex-col items-center justify-end overflow-hidden cursor-pointer" 
                             style="scroll-snap-align: center; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px;">
                            <img src="/static/characters/char${i}.png" class="absolute inset-0 w-full h-full object-contain pointer-events-none p-4 pb-16">
                            <span class="select-text absolute bottom-6 text-[10px] text-white/50 opacity-0 transition-opacity duration-300 pointer-events-none" style="font-family: 'Press Start 2P', monospace;">CLICK TO SELECT</span>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>

    <!-- GSAP Animations -->
    <script>
        const profileOverlay = document.getElementById('profile-overlay');
        const profileBtn = document.querySelector('.profile-btn');

        // Mount Animation
        profileBtn.onclick = () => {
            profileOverlay.classList.remove('hidden');
            gsap.fromTo('.char-card',
                { y: 40, opacity: 0 },
                { y: 0, opacity: 1, stagger: 0.1, duration: 0.8, ease: 'back.out(1.5)', clearProps: 'transform,opacity' }
            );
        };

        function closeOverlay() {
            profileOverlay.classList.add('hidden');
        }

        // Hover & Click Logic
        const cards = document.querySelectorAll('.char-card');

        cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                if (!card.classList.contains('selected-card')) {
                    gsap.to(card, { scale: 1.08, duration: 0.3, ease: 'power2.out' });
                    card.style.borderColor = 'rgb(255, 255, 255)';
                    card.style.boxShadow = '0 0 30px rgba(255, 255, 255, 0.9)';
                    const sText = card.querySelector('.select-text');
                    if (sText) {
                        sText.classList.remove('opacity-0', 'text-white/50');
                        sText.classList.add('opacity-100', 'text-white');
                    }
                }
            });

            card.addEventListener('mouseleave', () => {
                if (!card.classList.contains('selected-card')) {
                    gsap.to(card, { scale: 1, duration: 0.3, ease: 'power2.out' });
                    card.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                    card.style.boxShadow = 'none';
                    const sText = card.querySelector('.select-text');
                    if (sText) {
                        sText.classList.remove('opacity-100', 'text-white');
                        sText.classList.add('opacity-0', 'text-white/50');
                    }
                }
            });

            card.addEventListener('click', (e) => {
                e.stopPropagation();

                // Clear others
                cards.forEach(c => {
                    c.classList.remove('selected-card');
                    gsap.to(c, { scale: 1, duration: 0.3 });
                    c.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                    c.style.boxShadow = 'none';
                    const cText = c.querySelector('.select-text');
                    if (cText) {
                        cText.innerText = 'CLICK TO SELECT';
                        cText.classList.remove('opacity-100', 'text-white');
                        cText.classList.add('opacity-0', 'text-white/50');
                    }
                });

                // Set selected
                card.classList.add('selected-card');
                card.style.borderColor = 'rgb(255, 255, 255)';
                card.style.boxShadow = '0 0 30px rgba(255, 255, 255, 0.9)';
                const sText = card.querySelector('.select-text');
                if (sText) {
                    sText.innerText = 'SELECTED';
                    sText.classList.remove('opacity-0', 'text-white/50');
                    sText.classList.add('opacity-100', 'text-white');
                }

                // Click Bounce
                gsap.fromTo(card,
                    { scale: 0.95 },
                    { scale: 1.08, ease: 'elastic.out(1, 0.4)', duration: 0.6 }
                );
            });
        });
    </script>
</body>

</html>
