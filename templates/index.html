<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Fighter Lobby</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* =====================
           BASE RESET
        ======================== */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        /* =====================
           LAYER 0: BACKGROUND
        ======================== */
        .bg-gif {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            background-color: #222;
            background-image: url('/static/bg_gif.gif?v=2');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            opacity: 0.85;
        }

        /* =====================
           LAYER 10: PERSISTENT NAV (Gear Icon)
        ======================== */
        #settings-gear {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 1000;
            cursor: pointer;
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 0 8px white);
            transition: transform 0.4s ease, filter 0.3s ease;
            pointer-events: auto;
        }
        #settings-gear:hover {
            transform: rotate(45deg) scale(1.1);
            filter: drop-shadow(0 0 16px white);
        }
        #settings-gear.open {
            transform: rotate(90deg);
        }

        /* =====================
           LAYER 100: SETTINGS HUB (Glassmorphic Popover)
        ======================== */
        #settings-hub {
            position: fixed;
            top: 70px;
            right: 24px;
            width: 280px;
            z-index: 900;
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-12px);
            box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        #settings-hub.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .hub-avatar-ring {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.7);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
        }
        .hub-avatar-ring img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
        }

        .hub-username {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: white;
            text-shadow: 0 0 12px white;
            text-align: center;
            letter-spacing: 1px;
        }

        .hub-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
        }

        .hub-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: white;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            padding: 12px 18px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            text-shadow: 0 0 8px white;
            letter-spacing: 1px;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
        }
        .hub-btn:hover {
            background: rgba(255,255,255,0.18);
            border-color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            transform: scale(1.03);
        }

        /* =====================
           LAYER 200: MAIN MENU
        ======================== */
        #main-menu {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        /* =====================
           COMMON BUTTON STYLES
        ======================== */
        .cinematic-btn {
            background-color: rgba(20, 20, 20, 0.45);
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
        }
        .cinematic-btn:hover {
            background-color: rgba(60, 60, 60, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
            border-color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        }
        .cinematic-btn:active { transform: scale(0.98); }

        .main-btn {
            padding: 16px 32px;
            min-width: 220px;
        }

        /* =====================
           LAYER 300: PROFILE OVERLAY (Deep Layer)
        ======================== */
        #profile-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            /* Purple bg matches the original purple clouds request */
            background: url('/static/staticpurple_bg.jpg') no-repeat center center;
            background-size: cover;
        }
        #profile-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            backdrop-filter: blur(12px) brightness(0.4);
            -webkit-backdrop-filter: blur(12px) brightness(0.4);
        }
        #profile-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* =====================
           LAYER 300: LOBBY OVERLAY
        ======================== */
        #lobby-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #lobby-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* =====================
           CAROUSEL STYLES
        ======================== */
        .carousel-wrapper {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .carousel-wrapper::-webkit-scrollbar { display: none; }

        /* =====================
           PIXEL FONT
        ======================== */
        .pixel-text {
            font-family: 'Press Start 2P', monospace;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 255, 255, 0.4);
        }
        .heavy-glow {
            text-shadow: 0 0 15px rgba(255,255,255,1), 0 0 30px rgba(255,255,255,0.8), 0 0 45px rgba(255,255,255,0.6);
        }

        /* =====================
           LOBBY STYLES
        ======================== */
        .lobby-box-wrapper {
            position: relative;
            background: transparent;
            display: inline-block;
            margin-bottom: 24px;
            transform: scale(0.85);
        }
        .lobby-box-content {
            background-color: transparent;
            backdrop-filter: none;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .slot-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            height: 90px;
            overflow: visible;
        }
        .slot {
            width: 55px;
            height: 75px;
            font-size: 32px;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            font-family: 'Press Start 2P', monospace;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .slot::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(10,25,47,0.9) 0%, transparent 20%, transparent 80%, rgba(10,25,47,0.9) 100%);
            pointer-events: none;
        }
        .slot-inner {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .char {
            height: 71px; /* 75 minus borders */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.6);
        }
        .dash-char {
            font-size: 32px;
            color: #fff;
            display: flex;
            align-items: center;
            height: 75px;
            font-family: 'Press Start 2P', monospace;
            margin: 0 8px;
            text-shadow: 0 0 20px white;
        }
        .player-slot-card {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }
        .player-slot-card.filled { 
            border-color: rgba(255,255,255,0.8); 
            box-shadow: 0 0 20px rgba(255,255,255,0.2), inset 0 0 10px rgba(255,255,255,0.1); 
        }
        .player-slot-card.filled img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            padding: 10px; 
            transform: scale(1.1);
        }

        .pomodoro-panel {
            background: transparent;
            padding: 8px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            width: 100%;
            gap: 12px;
            position: relative;
            z-index: 10;
        }
        .pomo-btn {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: none;
            border-radius: 4px;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pomo-btn:hover {
            color: #fff;
            border: 1px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.1);
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(255,255,255,0.5), inset 0 0 5px rgba(255,255,255,0.3);
        }
        .pixel-toggle { display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s ease; background: transparent; }
        .pixel-toggle i { font-size: 32px; color: rgba(255,255,255,0.5); transition: all 0.3s ease; }
        .pixel-toggle.active i { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,1); }

        .lobby-main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Prevent pushing items off top */
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 10;
            gap: 20px;
            padding-top: 8vh;
            overflow-y: auto; /* Safety scroll */
        }
        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.05;
        }
        .footer-action-container {
            width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            position: relative;
            z-index: 10;
        }
        .footer-btn {
            background: rgba(20,20,20,0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 0 24px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            height: 48px;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }
        .footer-btn:hover { border-color: #fff; background: rgba(60,60,60,0.8); box-shadow: 0 0 15px rgba(255,255,255,0.4); transform: scale(1.05); }
        .footer-btn.primary-glow { border-color: #fff; background: rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(255,255,255,0.3); text-shadow: 0 0 8px rgba(255,255,255,0.8); }
        .footer-btn.primary-glow:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 30px rgba(255,255,255,0.6); transform: scale(1.05); }

        @keyframes hostPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.6); }
            50% { box-shadow: 0 0 30px rgba(255,255,255,0.8); border-color: rgba(255,255,255,1); }
        }
        .host-glow { animation: hostPulse 2s infinite ease-in-out; background-color: rgba(255,255,255,0.15) !important; }
    </style>
</head>

<body>
    <!-- LAYER 0: Forest Background -->
    <div class="bg-gif"></div>

    <!-- LAYER 1000: Persistent Gear Nav (always on top) -->
    <nav style="position: fixed; inset: 0; pointer-events: none; z-index: 1000;">
        <i class="ph ph-gear-six" id="settings-gear" onclick="event.stopPropagation(); toggleSettingsHub()"></i>
    </nav>

    <!-- LAYER 900: Settings Hub (Glassmorphic Popover) -->
    <div id="settings-hub">
        <!-- Avatar Ring -->
        <div class="hub-avatar-ring">
            <img id="hub-avatar-img" src="/static/characters/char1.png" alt="Player Avatar">
        </div>
        <!-- Player Name -->
        <div class="hub-username" id="hub-username">PLAYER ONE</div>
        <div class="hub-divider"></div>
        <!-- Actions -->
        <button class="hub-btn" onclick="openFromHub('profile-overlay')">
            <i class="ph ph-user-circle-gear" style="margin-right: 8px; vertical-align: middle;"></i>CUSTOMIZE AVATAR
        </button>
    </div>

    <!-- LAYER 200: Main Menu -->
    <div id="main-menu">
        <button class="cinematic-btn main-btn" onclick="navigateTo('lobby-overlay')">Create Lobby</button>
        <button class="cinematic-btn main-btn" onclick="alert('Join Lobby coming soon!')">Join Lobby</button>
    </div>

    <!-- LAYER 300: Character Selection Overlay -->
    <div id="profile-overlay">
        <!-- The purple cloud background is applied via CSS (background + ::before blur) -->

        <!-- Header Controls (above the blur) -->
        <div class="absolute top-0 w-full flex justify-between p-8 z-20 items-center" style="position: relative; z-index: 10;">
            <input type="text" id="gamer-tag-input" placeholder="GAMER TAG"
                class="bg-transparent border-b-2 border-white text-white outline-none px-2 py-1 w-64"
                style="font-family: 'Press Start 2P', monospace; font-size: 10px; color: #FFF; text-shadow: 0 0 5px white; pointer-events: auto;"
                oninput="updatePlayerName(this.value)">

            <div class="flex gap-6">
                <i class="ph ph-x-circle text-white cursor-pointer"
                    style="font-size: 36px; filter: drop-shadow(0 0 10px white); pointer-events: auto;"
                    onclick="closeProfile()"></i>
                <i class="ph ph-check-circle text-white cursor-pointer"
                    style="font-size: 36px; filter: drop-shadow(0 0 10px white); pointer-events: auto;"
                    onclick="closeProfile()"></i>
            </div>
        </div>

        <!-- Content (above the blur) -->
        <div style="position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: -40px;">
            <h1 style="font-family: 'Press Start 2P', monospace; font-size: 20px; color: white; text-shadow: 0 0 15px white, 0 0 30px white; letter-spacing: 4px; margin-bottom: 28px;">CUSTOMIZE AVATAR</h1>

            <!-- Carousel -->
            <div id="character-carousel" class="carousel-wrapper"
                style="display: flex; gap: 64px; overflow-x: auto; width: 100%; align-items: center; padding: 16px 30vw; scroll-snap-type: x mandatory; pointer-events: auto;">
                <!-- Cards injected by JS -->
            </div>
        </div>
    </div>

    <!-- LAYER 300: Lobby Overlay -->
    <div id="lobby-overlay">
        <div class="scanlines"></div>

        <div class="lobby-main-content py-4">
            <!-- Lottery Code Slots -->
            <div id="fs-code-slots" class="slot-container" style="margin-bottom: 20px;"></div>

            <div class="flex flex-col items-center">
                <!-- Player Slots (Moved Up) -->

                <!-- Player Slots -->
                <div class="flex flex-col items-center mb-8">
                    <div class="pixel-text" style="font-size: 8px; color: white; opacity: 0.8; margin-bottom: 16px; letter-spacing: 2px;">1 / 4 PLAYERS JOINED</div>
                    <div class="flex gap-4">
                        <div class="player-slot-card filled" id="host-player-slot">
                            <img src="/static/characters/char1.png" id="host-avatar" alt="Player 1 Avatar">
                        </div>
                        <div class="player-slot-card"><i class="ph ph-user" style="color: rgba(255,255,255,0.2); font-size: 24px;"></i></div>
                        <div class="player-slot-card"><i class="ph ph-user" style="color: rgba(255,255,255,0.2); font-size: 24px;"></i></div>
                        <div class="player-slot-card"><i class="ph ph-user" style="color: rgba(255,255,255,0.2); font-size: 24px;"></i></div>
                    </div>
                </div>

                <!-- Pomodoro Settings -->
                <div class="flex flex-col items-center gap-4" style="width: 800px;">
                    <!-- Fight Duration -->
                    <div class="pomodoro-panel">
                        <div class="pixel-text" style="font-size: 8px; color: white; opacity: 0.8; letter-spacing: 2px;">FIGHT DURATION</div>
                        <div class="flex items-center gap-8 justify-center">
                            <div class="flex items-center gap-4">
                                <button class="pomo-btn timer-ctrl" onclick="adjustTime('fight-min', -5)"><i class="ph ph-minus" style="font-size: 18px;"></i></button>
                                <div class="heavy-glow pixel-text pomo-num" id="fight-min" style="font-size: 36px; color: white;">25</div>
                                <button class="pomo-btn timer-ctrl" onclick="adjustTime('fight-min', 5)"><i class="ph ph-plus" style="font-size: 18px;"></i></button>
                            </div>
                            <div class="pixel-text" style="font-size: 36px; color: white; opacity: 0.5;">:</div>
                            <div class="flex items-center gap-4">
                                <button class="pomo-btn timer-ctrl" onclick="adjustSeconds('fight-min','fight-sec',-15)"><i class="ph ph-minus" style="font-size: 18px;"></i></button>
                                <div class="heavy-glow pixel-text pomo-num" id="fight-sec" style="font-size: 36px; color: white;">00</div>
                                <button class="pomo-btn timer-ctrl" onclick="adjustSeconds('fight-min','fight-sec',15)"><i class="ph ph-plus" style="font-size: 18px;"></i></button>
                            </div>
                        </div>
                    </div>
                    <!-- Include Breaks Toggle (Ultra Compact) -->
                    <div class="flex items-center gap-4" style="margin: -5px 0 5px 0;">
                        <div class="pixel-text" style="font-size: 8px; color: white; opacity: 0.8; white-space: nowrap; letter-spacing: 1px;">INCLUDE BREAKS</div>
                        <div class="pixel-toggle active" id="breaks-toggle" onclick="toggleBreaks()">
                            <i class="ph ph-check-circle" id="breaks-icon"></i>
                        </div>
                    </div>

                    <!-- Break Time Row (Compact) -->
                    <div class="pomodoro-panel overflow-hidden" id="break-timer-panel" style="padding: 4px 32px; margin-bottom: 0;">
                        <div class="pixel-text" style="font-size: 8px; color: white; opacity: 0.8; letter-spacing: 2px;">BREAK TIME</div>
                        <div class="flex items-center gap-8 justify-center">
                            <div class="flex items-center gap-4">
                                <button class="pomo-btn timer-ctrl" onclick="adjustTime('break-min', -5)"><i class="ph ph-minus" style="font-size: 18px;"></i></button>
                                <div class="heavy-glow pixel-text pomo-num" id="break-min" style="font-size: 32px; color: white;">05</div>
                                <button class="pomo-btn timer-ctrl" onclick="adjustTime('break-min', 5)"><i class="ph ph-plus" style="font-size: 18px;"></i></button>
                            </div>
                            <div class="pixel-text" style="font-size: 32px; color: white; opacity: 0.5;">:</div>
                            <div class="flex items-center gap-4">
                                <button class="pomo-btn timer-ctrl" onclick="adjustSeconds('break-min','break-sec',-15)"><i class="ph ph-minus" style="font-size: 18px;"></i></button>
                                <div class="heavy-glow pixel-text pomo-num" id="break-sec" style="font-size: 32px; color: white;">00</div>
                                <button class="pomo-btn timer-ctrl" onclick="adjustSeconds('break-min','break-sec',15)"><i class="ph ph-plus" style="font-size: 18px;"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer Actions -->
            <div class="footer-action-container">
                <button class="footer-btn" id="copy-btn" onclick="copyRoomCode()">
                    <i class="ph ph-copy" style="font-size: 18px;"></i>
                    <span class="pixel-text" id="copy-text">COPY ID</span>
                </button>
                <div class="flex gap-4">
                    <button class="footer-btn" onclick="navigateTo('main-menu')">
                        <span class="pixel-text">LEAVE LOBBY</span>
                    </button>
                    <button class="footer-btn primary-glow">
                        <i class="ph-fill ph-play" style="font-size: 20px; margin-top: 2px;"></i>
                        <span class="pixel-text">START FIGHT</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===================== SCRIPTS ===================== -->
    <script>
        // ─────────────────────────────────────────────
        // STATE MACHINE
        // ─────────────────────────────────────────────
        const SCREENS = ['main-menu', 'profile-overlay', 'lobby-overlay'];
        let previousScreen = null; // tracks where "close profile" returns to

        function navigateTo(targetId) {
            // 1. Reset all screens
            SCREENS.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                
                el.classList.remove('visible');
                el.style.pointerEvents = 'none';
                
                if (id === 'main-menu') {
                    el.style.opacity = (targetId === 'main-menu') ? '1' : '0';
                    el.style.display = (targetId === 'main-menu') ? 'flex' : 'none';
                } else {
                    el.style.opacity = '0';
                    el.style.display = 'none';
                }
            });

            // 2. Activate target
            const target = document.getElementById(targetId);
            if (!target) return;

            target.style.display = 'flex';
            target.style.pointerEvents = 'auto';
            
            // Trigger GSAP for smooth entry
            gsap.to(target, { opacity: 1, duration: 0.4 });

            // 3. Logic specific to target
            if (targetId === 'main-menu') {
                target.style.pointerEvents = 'none'; // Allow clicking gear icon through background
                gsap.to(settingsGear, { opacity: 1, pointerEvents: 'auto', duration: 0.3 });
            } else {
                if (targetId === 'lobby-overlay') {
                    showLobbyAnimations();
                    initCharacterSync();
                    gsap.to(settingsGear, { opacity: 1, pointerEvents: 'auto', duration: 0.3 });
                }
                if (targetId === 'profile-overlay') {
                    // Hide gear to prevent overlap with X button
                    gsap.to(settingsGear, { opacity: 0, pointerEvents: 'none', duration: 0.3 });
                    
                    setTimeout(() => {
                        gsap.killTweensOf('.char-card');
                        gsap.fromTo('.char-card',
                            { y: 40, opacity: 0 },
                            { y: 0, opacity: 1, stagger: 0.08, duration: 0.7, ease: 'back.out(1.5)' }
                        );
                    }, 50);
                }
            }
        }

        // ─────────────────────────────────────────────
        // SETTINGS HUB
        // ─────────────────────────────────────────────
        const settingsHub = document.getElementById('settings-hub');
        const settingsGear = document.getElementById('settings-gear');

        function toggleSettingsHub() {
            const isOpen = settingsHub.classList.contains('visible');
            if (isOpen) {
                gsap.to(settingsHub, {
                    opacity: 0, y: -12, duration: 0.25, ease: 'power2.in',
                    onComplete: () => {
                        settingsHub.classList.remove('visible');
                        settingsHub.style.pointerEvents = 'none';
                    }
                });
                settingsGear.classList.remove('open');
            } else {
                settingsHub.classList.add('visible');
                settingsHub.style.pointerEvents = 'auto';
                gsap.fromTo(settingsHub,
                    { opacity: 0, y: -12 },
                    { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' }
                );
                settingsGear.classList.add('open');
                // Sync avatar in hub
                syncHubAvatar();
            }
        }

        // Close hub when clicking outside
        document.addEventListener('click', (e) => {
            if (!settingsHub.contains(e.target) && e.target !== settingsGear) {
                if (settingsHub.classList.contains('visible')) {
                    toggleSettingsHub();
                }
            }
        });

        // Deep-link from Settings Hub → Profile Page
        function openFromHub(screenId) {
            previousScreen = 'settings-hub'; // so close returns here
            // Close hub first
            gsap.to(settingsHub, {
                opacity: 0, y: -12, duration: 0.2, ease: 'power2.in',
                onComplete: () => {
                    settingsHub.classList.remove('visible');
                    settingsHub.style.pointerEvents = 'none';
                    settingsGear.classList.remove('open');
                }
            });
            // Hide main menu, open profile
            navigateTo(screenId);
        }

        // Profile close: goes back to settings hub if opened from there
        function closeProfile() {
            navigateTo('main-menu');
            if (previousScreen === 'settings-hub') {
                previousScreen = null;
                // Reopen hub after short delay
                setTimeout(() => {
                    settingsHub.classList.add('visible');
                    settingsHub.style.pointerEvents = 'auto';
                    settingsGear.classList.add('open');
                    gsap.fromTo(settingsHub,
                        { opacity: 0, y: -12 },
                        { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' }
                    );
                    syncHubAvatar();
                }, 350);
            }
        }

        function syncHubAvatar() {
            const saved = localStorage.getItem('selectedChar') || 'char1.png';
            const char = saved.includes('.png') ? saved : `char${saved}.png`;
            document.getElementById('hub-avatar-img').src = '/static/characters/' + char;
            const name = localStorage.getItem('playerName') || 'PLAYER ONE';
            document.getElementById('hub-username').textContent = name;
        }

        function updatePlayerName(val) {
            if (val.trim()) localStorage.setItem('playerName', val.trim().toUpperCase());
        }

        // ─────────────────────────────────────────────
        // CHARACTER CAROUSEL (Injected by JS)
        // ─────────────────────────────────────────────
        const carousel = document.getElementById('character-carousel');
        let cardsHTML = '';
        for (let i = 1; i <= 8; i++) {
            cardsHTML += `
            <div class="char-card" data-char="char${i}.png"
                 style="width: 240px; height: 360px; flex-shrink: 0; position: relative;
                        display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
                        cursor: pointer; scroll-snap-align: center; background: transparent; border: none; opacity: 1;">
                <img src="/static/characters/char${i}.png"
                     style="position: absolute; inset-x: 0; bottom: 48px; width: 100%; height: 120%;
                            object-fit: contain; pointer-events: none;
                            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));">
                <span class="select-text"
                      style="position: absolute; bottom: 8px; font-family: 'Press Start 2P', monospace;
                             font-size: 10px; color: rgba(255,255,255,0.5); opacity: 0;
                             transition: opacity 0.3s; pointer-events: none;">CLICK TO SELECT</span>
            </div>`;
        }
        carousel.innerHTML = cardsHTML;

        // Card interactions
        const cards = document.querySelectorAll('.char-card');
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                if (!card.classList.contains('selected-card')) {
                    gsap.to(card, { scale: 1.05, duration: 0.3, ease: 'power2.out' });
                    const img = card.querySelector('img');
                    if (img) img.style.filter = 'drop-shadow(0 0 25px rgba(255,255,255,0.8))';
                    const sText = card.querySelector('.select-text');
                    if (sText) sText.style.opacity = '1';
                }
            });
            card.addEventListener('mouseleave', () => {
                if (!card.classList.contains('selected-card')) {
                    gsap.to(card, { scale: 1, duration: 0.3, ease: 'power2.out' });
                    const img = card.querySelector('img');
                    if (img) img.style.filter = 'drop-shadow(0 0 15px rgba(255,255,255,0.3))';
                    const sText = card.querySelector('.select-text');
                    if (sText) sText.style.opacity = '0';
                }
            });
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                // Reset all
                cards.forEach(c => {
                    c.classList.remove('selected-card');
                    gsap.to(c, { scale: 1, duration: 0.3 });
                    const img = c.querySelector('img');
                    if (img) img.style.filter = 'drop-shadow(0 0 15px rgba(255,255,255,0.3))';
                    const sText = c.querySelector('.select-text');
                    if (sText) { sText.textContent = 'CLICK TO SELECT'; sText.style.opacity = '0'; }
                });
                // Select this card
                card.classList.add('selected-card');
                const img = card.querySelector('img');
                if (img) img.style.filter = 'drop-shadow(0 0 30px white)';
                const sText = card.querySelector('.select-text');
                if (sText) { sText.textContent = 'SELECTED'; sText.style.opacity = '1'; sText.style.color = 'white'; }
                // Save
                const charName = card.getAttribute('data-char');
                localStorage.setItem('selectedChar', charName);
                // Bounce
                gsap.fromTo(card, { scale: 0.95 }, { scale: 1.08, ease: 'elastic.out(1, 0.4)', duration: 0.6 });
            });
        });

        let currentRoomCode = "";
        const rollChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

        function generateRoomCode() {
            // 1. Generate random 5-char string (format: ABCD-1)
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const nums = "0123456789";
            let code = "";
            for(let i=0; i<4; i++) code += letters.charAt(Math.floor(Math.random() * letters.length));
            code += "-";
            code += nums.charAt(Math.floor(Math.random() * nums.length));
            
            currentRoomCode = code;

            // 2. Build DOM
            const container = document.getElementById('fs-code-slots');
            container.innerHTML = '';
            
            currentRoomCode.split('').forEach((char, index) => {
                if (char === '-') {
                    const dash = document.createElement('div');
                    dash.className = 'dash-char';
                    dash.textContent = '-';
                    container.appendChild(dash);
                    return;
                }

                const slot = document.createElement('div');
                slot.className = 'slot';
                const inner = document.createElement('div');
                inner.className = 'slot-inner';
                
                // Add deco chars
                const spinCount = 15 + (index * 5);
                for (let i = 0; i < spinCount; i++) {
                    const rChar = document.createElement('div');
                    rChar.className = 'char';
                    rChar.style.color = 'rgba(255,255,255,0.35)'; // More visible during spin
                    rChar.textContent = rollChars.charAt(Math.floor(Math.random() * rollChars.length));
                    inner.appendChild(rChar);
                }
                
                // Final char
                const finalChar = document.createElement('div');
                finalChar.className = 'char final-char';
                finalChar.textContent = char;
                inner.appendChild(finalChar);
                
                slot.appendChild(inner);
                container.appendChild(slot);
            });

                const inners = container.querySelectorAll('.slot-inner');
            inners.forEach((inner, idx) => {
                const dist = -((inner.children.length - 1) * 71); // 71 matches inner height
                gsap.fromTo(inner, 
                    { y: 0 },
                    { 
                        y: dist, 
                        duration: 1.8 + (idx * 0.3), 
                        ease: "power4.inOut",
                        delay: 0.1,
                        onComplete: () => {
                            const fc = inner.querySelector('.final-char');
                            fc.classList.add('heavy-glow');
                            gsap.fromTo(fc, { scale: 1.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(2)" });
                        }
                    }
                );
            });
        }

        function showLobbyAnimations() {
            generateRoomCode();
            gsap.fromTo('.pomodoro-panel', { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, delay: 0.4, ease: "power2.out" });
            gsap.fromTo('.footer-btn',     { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, stagger: 0.1, delay: 0.7  });
            gsap.fromTo('.player-slot-card', { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, stagger: 0.1, delay: 0.5, ease: "back.out(1.5)" });
        }

        function copyRoomCode() {
            navigator.clipboard.writeText(currentRoomCode).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = currentRoomCode;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            });
            const copyBtn  = document.getElementById('copy-btn');
            const copyText = document.getElementById('copy-text');
            copyText.textContent = "COPIED! ✨";
            copyBtn.classList.add('primary-glow');
            gsap.fromTo(copyBtn,
                { scale: 1.1, backgroundColor: 'rgba(255,255,255,0.3)' },
                { scale: 1,   backgroundColor: 'rgba(20,20,20,0.6)',   duration: 0.5 }
            );
            setTimeout(() => {
                copyText.textContent = "COPY ID";
                copyBtn.classList.remove('primary-glow');
            }, 1500);
        }

        // ─────────────────────────────────────────────
        // LOBBY: TIMER LOGIC
        // ─────────────────────────────────────────────
        document.querySelectorAll('.timer-ctrl').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetNum = btn.parentNode.querySelector('.pomo-num');
                if (targetNum) gsap.fromTo(targetNum, { scale: 1.2 }, { scale: 1, duration: 0.2, ease: "bounce.out" });
            });
        });

        function adjustTime(elementId, amount) {
            const el = document.getElementById(elementId);
            let v = parseInt(el.textContent) + amount;
            if (v < 5)  v = 5;
            if (v > 60) v = 60;
            el.textContent = v < 10 ? '0' + v : v;
        }

        function adjustSeconds(minId, secId, amount) {
            const secEl = document.getElementById(secId);
            const minEl = document.getElementById(minId);
            let sec = parseInt(secEl.textContent);
            let min = parseInt(minEl.textContent);
            sec += amount;
            if (sec >= 60) { sec -= 60; adjustTime(minId, 1); }
            else if (sec < 0) {
                if (min > 5) { sec = 60 + sec; minEl.textContent = (min - 1) < 10 ? '0' + (min - 1) : (min - 1); }
                else if (min === 5) { sec = 0; }
                else { sec = 0; }
            }
            secEl.textContent = sec === 0 ? '00' : (sec < 10 ? '0' + sec : sec);
            gsap.fromTo(secEl, { scale: 1.2 }, { scale: 1, duration: 0.2, ease: "bounce.out" });
        }



        // ─────────────────────────────────────────────
        // LOBBY: INCLUDE BREAKS TOGGLE
        // ─────────────────────────────────────────────
        function toggleBreaks() {
            const tgl = document.getElementById('breaks-toggle');
            const icon = document.getElementById('breaks-icon');
            const breakPanel = document.getElementById('break-timer-panel');
            if (tgl.classList.contains('active')) {
                tgl.classList.remove('active');
                icon.className = "ph ph-x-circle";
                gsap.fromTo(tgl, { scale: 0.9 }, { scale: 1, duration: 0.5, ease: "elastic.out(1,0.5)" });
                gsap.to(breakPanel, {
                    height: 0, opacity: 0, marginTop: -10, duration: 0.4, ease: "power2.in",
                    onComplete: () => {
                        breakPanel.style.display = 'none';
                    }
                });
            } else {
                tgl.classList.add('active');
                icon.className = "ph ph-check-circle";
                gsap.fromTo(tgl, { scale: 0.9 }, { scale: 1, duration: 0.5, ease: "elastic.out(1,0.5)" });
                breakPanel.style.display = 'flex';
                gsap.fromTo(breakPanel, 
                    { height: 0, opacity: 0, marginTop: -10 }, 
                    { height: 'auto', opacity: 1, marginTop: 0, duration: 0.5, ease: "back.out(1.2)" }
                );
            }
        }

        // ─────────────────────────────────────────────
        // INIT
        // ─────────────────────────────────────────────
        function initCharacterSync() {
            const saved = localStorage.getItem('selectedChar') || 'char1.png';
            const char = saved.includes('.png') ? saved : `char${saved}.png`;
            // Highlight saved card
            document.querySelectorAll('.char-card').forEach(c => {
                if (c.getAttribute('data-char') === char) {
                    c.classList.add('selected-card');
                    const img = c.querySelector('img');
                    if (img) img.style.filter = 'drop-shadow(0 0 30px white)';
                    const sText = c.querySelector('.select-text');
                    if (sText) { sText.textContent = 'SELECTED'; sText.style.opacity = '1'; sText.style.color = 'white'; }
                }
            });
            // Update host avatar in lobby
            const hostAvatar = document.getElementById('host-avatar');
            if (hostAvatar) hostAvatar.src = '/static/characters/' + char;
            const hostSlot = document.getElementById('host-player-slot');
            if (hostSlot) { hostSlot.style.filter = "drop-shadow(0 0 12px white)"; hostSlot.classList.add('host-glow'); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Start with main menu visible
            navigateTo('main-menu');
            initCharacterSync();
            syncHubAvatar();
        });
    </script>
</body>

</html>
